name: Build Jekyll site
on:
  - push
  - workflow_dispatch

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ARCH: x86_64 # TODO make configurable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content repository
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.WEBSITE_CONTENT_REPO }}
          path: _content

      - name: Checkout template repository
        uses: actions/checkout@v6
        with:
          path: _templates

      - name: Merge content and templates
        run: |
          rm -rf _content/.git* _templates/.git*
          mv -f _templates/* ./
          mv -f _content/* ./
          rmdir _content _templates

      - name: Download latest releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh repo list --limit 9999 --no-archived --source --topic package \
              --json name "$GITHUB_REPOSITORY_OWNER" > package-repos.json
          cat package-repos.json | jq -r '.[] | .name' > package-repos.txt
          mkdir -p "$ARCH"
          while IFS= read -r repo; do
            # FIXME continue if the repo has no releases
            gh release download --repo "$GITHUB_REPOSITORY_OWNER/$repo" \
                --pattern "*-$ARCH.pkg.*" --pattern '*-any.pkg.*' --dir "$ARCH"
          done < package-repos.txt
          rm -f package-repos.*

      - name: Create repo
        uses: callmetango/archlinux-make-repo-action@HEAD
        with:
          reponame: xlibre
          path: ${{ env.ARCH }}

      - name: Generate directory index
        uses: gacts/directory-listing@v1
        with:
          target: ${{ env.ARCH }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
